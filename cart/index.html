<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Amazon Clone - Cart</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="logo">amazon<span>.in</span></div>
    <div class="nav">
      <a href="#">Sign In</a>
      <a href="#">Orders</a>
      <a href="#">Cart</a>
    </div>
  </header>

  <!-- Main Cart Content -->
  <main class="cart-container">
    <div class="cart-message">
      <img src="https://m.media-amazon.com/images/G/31/cart/empty/SC_EmptyCartMobile_2x._CB405611361_.png" alt="Empty Cart" />
      <h2>Your Amazon Cart is empty</h2>
      <p>Shop today’s deals and add items to your cart.</p>
      <div class="btn-group">
        <a href="#" class="btn">Sign In</a>
        <a href="#" class="btn outline">Continue Shopping</a>
      </div>
    </div>
  </main>
</body>
</html>
