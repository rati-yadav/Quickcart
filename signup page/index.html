<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Amazon Clone - Sign Up</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="amazon-logo">
    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg" alt="Amazon">
  </div>

  <div class="signup-box">
    <h1>Create account</h1>
    <form>
      <label for="name">Your name</label>
      <input type="text" id="name" placeholder="First and last name" required>

      <label for="email">Mobile number or email</label>
      <input type="email" id="email" required>

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="At least 6 characters" required>

      <label for="confirm">Re-enter password</label>
      <input type="password" id="confirm" required>

      <button type="submit" class="btn">Create your Amazon account</button>
    </form>

    <p class="terms">
      By creating an account, you agree to Amazon's
      <a href="#">Conditions of Use</a> and
      <a href="#">Privacy Notice</a>.
    </p>

    <hr>

    <p class="signin-link">
      Already have an account?
      <a href="../signin page/index.html">Sign in</a>
    </p>
  </div>
</body>
</html>
